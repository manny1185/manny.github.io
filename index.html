<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#101820">
    <meta
      name="description"
      content="Manny Games is a mobile-friendly GitHub Pages game hub with Sky Ring Pilot and Pulse Garden."
    >
    <title>Manny Games</title>
    <link rel="stylesheet" href="./site.css">
  </head>
  <body>
    <main class="hub-shell">
      <header class="hub-header" aria-label="Manny Games">
        <p class="eyebrow">GitHub Pages Game Lab</p>
        <h1>Manny Games</h1>
        <p class="intro">两个可以直接打开玩的网页游戏。</p>
      </header>

      <section class="game-grid" aria-label="Game list">
        <a class="game-card flight-card" href="./flight-sim/">
          <span class="preview flight-preview" aria-hidden="true">
            <span class="sky-band"></span>
            <span class="ring ring-one"></span>
            <span class="ring ring-two"></span>
            <span class="plane-shape"></span>
          </span>
          <span class="game-copy">
            <span class="game-kicker">3D Flight</span>
            <strong>Sky Ring Pilot</strong>
            <span>固定翼穿环飞行挑战</span>
          </span>
          <span class="launch">Play</span>
        </a>

        <a class="game-card garden-card" href="./pulse-garden/">
          <span class="preview garden-preview" aria-hidden="true">
            <span class="garden-glow"></span>
            <span class="seed-dot"></span>
            <span class="pulse-ring pulse-one"></span>
            <span class="pulse-ring pulse-two"></span>
            <span class="bloom bloom-one"></span>
            <span class="bloom bloom-two"></span>
          </span>
          <span class="game-copy">
            <span class="game-kicker">Mobile Touch</span>
            <strong>Pulse Garden</strong>
            <span>单指脉冲花园</span>
          </span>
          <span class="launch">Play</span>
        </a>
      </section>
    </main>
  </body>
</html>
